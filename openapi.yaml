components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: hlp_ prefixed API key
      description: API key with hlp_ prefix, obtained from POST /headless/apiKeys/create
    BasicAuth:
      type: http
      scheme: basic
      description: HTTP Basic authentication (username:password)
  schemas:
    Error:
      type: object
      required:
      - errorCode
      - errors
      properties:
        errorCode:
          type: integer
          description: HTTP status code
        errors:
          type: string
          description: Error message
    ApiKeyCreateRequest:
      type: object
      required:
      - userId
      properties:
        userId:
          type: string
          description: User ID to associate with the key
        name:
          type: string
          description: Human-readable key name
        scopes:
          type: string
          description: Comma-separated permission scopes
        expiresInDays:
          type: integer
          description: 'Days until key expires (default: 365)'
    ApiKeyCreateResponse:
      type: object
      properties:
        apiKeyId:
          type: string
          description: Internal key ID
        rawKey:
          type: string
          description: The raw API key (hlp_ prefix). Store this securely — it cannot be retrieved again.
        name:
          type: string
        expiresDate:
          type: string
          format: date-time
    ApiKeyDetail:
      type: object
      properties:
        apiKeyId:
          type: string
        userId:
          type: string
        name:
          type: string
        prefix:
          type: string
          description: First 8 chars of raw key for identification
        scopes:
          type: string
        isActive:
          type: string
          description: Y/N
        createdDate:
          type: string
          format: date-time
        expiresDate:
          type: string
          format: date-time
        lastUsedDate:
          type: string
          format: date-time
    WebhookRegisterRequest:
      type: object
      required:
      - name
      - targetUrl
      - subscribedEvents
      properties:
        name:
          type: string
          description: Webhook endpoint name
        targetUrl:
          type: string
          format: uri
          description: URL to receive POST payloads
        subscribedEvents:
          type: string
          description: Comma-separated event names
        secret:
          type: string
          description: HMAC signing secret (auto-generated if omitted)
        active:
          type: string
          description: Y/N, default Y
    WebhookRegisterResponse:
      type: object
      properties:
        webhookId:
          type: string
        secret:
          type: string
          description: HMAC signing secret
    WebhookDelivery:
      type: object
      properties:
        deliveryId:
          type: string
        webhookId:
          type: string
        webhookName:
          type: string
        targetUrl:
          type: string
          format: uri
        eventName:
          type: string
        payload:
          type: string
          description: JSON payload sent
        statusCode:
          type: integer
          description: HTTP status from target
        responseBody:
          type: string
          description: Response from target
        attemptCount:
          type: integer
        statusEnumId:
          type: string
          enum:
          - WdsPending
          - WdsDelivered
          - WdsFailed
        durationMs:
          type: integer
          description: Delivery duration in milliseconds
        createdDate:
          type: string
          format: date-time
        deliveredDate:
          type: string
          format: date-time
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum:
          - UP
          - DOWN
        database:
          type: string
        serverTime:
          type: string
          format: date-time
        version:
          type: string
    DashboardStats:
      type: object
      properties:
        orderCount:
          type: integer
        revenue:
          type: number
        pendingShipments:
          type: integer
        activeWebhooks:
          type: integer
        apiCalls24h:
          type: integer
    WebhookEvent:
      type: object
      required:
      - event
      - timestamp
      - data
      properties:
        event:
          type: string
          description: Event name (e.g. order.placed)
          enum:
          - order.placed
          - order.approved
          - order.completed
          - order.cancelled
          - shipment.shipped
          - shipment.delivered
          - inventory.updated
          - payment.received
          - invoice.created
          - invoice.sent
        timestamp:
          type: string
          format: date-time
        data:
          type: object
          description: Event-specific payload data
