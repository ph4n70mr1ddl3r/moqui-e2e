openapi: 3.0.3
info:
  title: Headless ERP API
  version: 1.2.0
  description: '# Headless ERP — REST API


    A headless ERP system built on Moqui Framework + Mantle UDM/USL, exposing all ERP functionality via REST API.


    ## Authentication


    All endpoints require authentication except `GET /headless/health`. Two methods are supported:


    1. **Bearer Token** — Pass an API key: `Authorization: Bearer hlp_xxxx...`

    2. **HTTP Basic** — Pass username:password


    API keys are managed via `POST /headless/apiKeys/create`.


    ## Webhook Events


    Register webhook endpoints to receive real-time notifications when business events occur:


    | Event | Trigger |

    |---|---|

    | `order.placed` | Order status → OrderPlaced |

    | `order.approved` | Order status → OrderApproved |

    | `order.completed` | Order status → OrderCompleted |

    | `order.cancelled` | Order status → OrderCancelled |

    | `shipment.shipped` | Shipment status → ShipShipped |

    | `shipment.delivered` | Shipment status → ShipDelivered |

    | `inventory.updated` | Asset status → AssetAvailable |

    | `payment.received` | Payment status → PmntDelivered |

    | `invoice.created` | Invoice status → InvoiceReady |

    | `invoice.sent` | Invoice status → InvoiceInProcess |


    Webhook payloads are HMAC-SHA256 signed. See the `WebhookEvent` schema for details.

    '
